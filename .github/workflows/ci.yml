name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('bun.lock', 'nx.json', 'package.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI
        run: bun run ci

      - name: Run Integration Tests
        if: hashFiles('tests/bin/gemini') != ''
        run: |
          sed -i 's/\r$//' tests/bin/gemini
          chmod +x tests/bin/gemini
          bun run test:integration

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        provider:
          - key: gemini
            tag: gemini
          - key: claude_code
            tag: claude-code
          - key: openai_codex
            tag: openai-codex
          - key: opencode
            tag: opencode
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        id: repo_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Determine image tag suffix
        id: tag_suffix
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=latest-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            AGENT_PROVIDER=${{ matrix.provider.key }}
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/phoenix-agent-oauth:${{ matrix.provider.tag }}-${{ steps.tag_suffix.outputs.latest_tag }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/phoenix-agent-oauth:${{ matrix.provider.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.provider.key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.provider.key }}
