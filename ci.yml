---
x-fibe.gg:
  metadata:
    description: "CI/CD Pipeline for Fibe Agent"
    category: "Development"
    job_mode: true
    source_defaults: true

x-env-bun: &env-bun
  CI: "true"
  NPM_CONFIG_JOBS:
  NX_PARALLEL:
  PATH: "/opt/fibe-ci-tools/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

x-common-bun: &common-bun
  image: node:24
  working_dir: /app
  volumes:
    - ./:/app
    - bun-cache:/root/.bun/install/cache
    - npm-cache:/root/.npm
    - nx-cache:/app/.nx/cache
    - apt-cache:/var/cache/apt
    - ci-tools:/opt/fibe-ci-tools
    - ci-results:/results
  environment: *env-bun

x-env-build: &env-build
  CI: "true"
  FIBE_BRANCH:
  FIBE_REPOSITORY_OWNER:
  FIBE_REPOSITORY_URL:
  GH_USERNAME:
  GH_TOKEN:
  BUILDX_BUILDER_NAME: fibe-agent-ci
  BUILDX_BUILDER_RECREATE:
  BUILDX_PROGRESS:
  BUILDKIT_MAX_PARALLELISM:
  BUILDKIT_STEP_LOG_MAX_SIZE:
  BUILDKIT_STEP_LOG_MAX_SPEED:
  BUILDX_PROVENANCE:
  BUILDX_SBOM:
  CI_COMMON_CACHE_EXPORT:
  CI_COMMON_CACHE_WARM_PARALLEL:
  CI_PROVIDER_CACHE_EXPORT:
  NPM_CONFIG_JOBS:
  NX_PARALLEL:

x-required-ci-env: &required-ci-env
  FIBE_BRANCH:
  GH_USERNAME:
  GH_TOKEN:

x-common-build: &common-build
  image: docker:29.3.1-cli
  working_dir: /app
  volumes:
    - ./:/app
    - /var/run/docker.sock:/var/run/docker.sock
    - buildx-state:/root/.docker/buildx
    - ci-results:/results
  environment: *env-build

x-ci-healthcheck: &ci-healthcheck
  test: ["CMD-SHELL", "test -f /tmp/ci-done"]
  interval: ${CI_STEP_HEALTH_INTERVAL:-1s}
  timeout: ${CI_STEP_HEALTH_TIMEOUT:-1s}
  retries: ${CI_STEP_HEALTH_RETRIES:-3}
  # Grace period for the first slow cache-warming run. A successful check still
  # marks the service healthy immediately; this does not add a 7200s delay.
  start_period: ${CI_STEP_HEALTH_START_PERIOD:-7200s}

x-source-labels: &source-labels
  fibe.gg/source_mount: "/app"
  fibe.gg/job_watch: "false"

x-completed-step: &completed-step
  restart: 'no'
  healthcheck: *ci-healthcheck

x-bun-ci-step: &bun-ci-step
  <<: [*common-bun, *completed-step]
  labels: *source-labels

x-build-ci-step: &build-ci-step
  <<: [*common-build, *completed-step]
  labels: *source-labels
  entrypoint: ["/bin/sh", "-lc"]

x-provider-build-env: &provider-build-env
  <<: *env-build
  CI_REQUIRED_STEPS: ci-build-common

x-provider-build-step: &provider-build-step
  <<: *build-ci-step
  depends_on:
    ci-build-common:
      condition: service_healthy
  command:
    - apk add --no-cache nodejs git >/dev/null 2>&1 && exec node /app/scripts/ci/ci-step.mjs node /app/scripts/ci/build-provider.mjs

services:
  ci-setup:
    <<: *bun-ci-step
    environment:
      <<: [*env-bun, *required-ci-env]
      CI_STEP_NAME: ci-setup
      CI_REQUIRED_STEPS: ""
      CI_REQUIRED_ENVS: "FIBE_BRANCH GH_USERNAME GH_TOKEN"
    command: ["node", "/app/scripts/ci/ci-step.mjs", "node", "/app/scripts/ci/setup.mjs"]

  ci-lint:
    <<: *bun-ci-step
    depends_on:
      ci-setup:
        condition: service_healthy
    environment:
      <<: *env-bun
      CI_STEP_NAME: ci-lint
      CI_REQUIRED_STEPS: ci-setup
    command: ["node", "/app/scripts/ci/ci-step.mjs", "node", "/app/scripts/ci/lint.mjs"]

  ci-test:
    <<: *bun-ci-step
    depends_on:
      ci-setup:
        condition: service_healthy
    environment:
      <<: *env-bun
      CI_STEP_NAME: ci-test
      CI_REQUIRED_STEPS: ci-setup
    command: ["node", "/app/scripts/ci/ci-step.mjs", "node", "/app/scripts/ci/test.mjs"]

  ci-scan:
    image: aquasec/trivy:0.69.3
    working_dir: /app
    depends_on:
      ci-setup:
        condition: service_healthy
    volumes:
      - ./:/app
      - trivy-cache:/root/.cache/trivy
      - ci-results:/results
    labels: *source-labels
    environment:
      CI_STEP_NAME: ci-scan
      CI_REQUIRED_STEPS: ci-setup
    <<: *completed-step
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - apk add --no-cache nodejs >/dev/null 2>&1 && exec node /app/scripts/ci/ci-step.mjs trivy fs --cache-dir /root/.cache/trivy --ignore-unfixed --format table --severity CRITICAL,HIGH .

  ci-build-common:
    <<: *build-ci-step
    depends_on:
      ci-lint:
        condition: service_healthy
      ci-test:
        condition: service_healthy
      ci-scan:
        condition: service_healthy
    environment:
      <<: *env-build
      CI_STEP_NAME: ci-build-common
      CI_REQUIRED_STEPS: "ci-lint ci-test ci-scan"
    command:
      - apk add --no-cache nodejs >/dev/null 2>&1 && exec node /app/scripts/ci/ci-step.mjs node /app/scripts/ci/build-common.mjs

  ci-build-gemini:
    <<: *provider-build-step
    environment:
      <<: *provider-build-env
      CI_STEP_NAME: ci-build-gemini
      PROVIDER: gemini
      TAG_NAME: gemini

  ci-build-claude:
    <<: *provider-build-step
    environment:
      <<: *provider-build-env
      CI_STEP_NAME: ci-build-claude
      PROVIDER: claude_code
      TAG_NAME: claude-code

  ci-build-codex:
    <<: *provider-build-step
    environment:
      <<: *provider-build-env
      CI_STEP_NAME: ci-build-codex
      PROVIDER: openai_codex
      TAG_NAME: openai-codex

  ci-build-opencode:
    <<: *provider-build-step
    environment:
      <<: *provider-build-env
      CI_STEP_NAME: ci-build-opencode
      PROVIDER: opencode
      TAG_NAME: opencode

  ci-build-cursor:
    <<: *provider-build-step
    environment:
      <<: *provider-build-env
      CI_STEP_NAME: ci-build-cursor
      PROVIDER: cursor
      TAG_NAME: cursor

  ci-results-notify:
    image: node:24-slim
    working_dir: /app
    depends_on:
      ci-build-gemini:
        condition: service_healthy
      ci-build-claude:
        condition: service_healthy
      ci-build-codex:
        condition: service_healthy
      ci-build-opencode:
        condition: service_healthy
      ci-build-cursor:
        condition: service_healthy
    volumes:
      - ./:/app
      - ci-results:/results
    labels:
      fibe.gg/source_mount: "/app"
      fibe.gg/job_watch: "true"
    environment:
      SLACK_WEBHOOK_URL:
      DPASTE_TOKEN:
      FIBE_BRANCH:
      FIBE_REPOSITORY_LABEL:
    restart: 'no'
    command: ["node", "/app/scripts/ci/notify.mjs"]

volumes:
  bun-cache:
  nx-cache:
  apt-cache:
  npm-cache:
  ci-tools:
  trivy-cache:
  buildx-state:
  ci-results:
